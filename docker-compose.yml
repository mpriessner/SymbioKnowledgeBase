services:
  # ── Next.js Application ────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into client JS at build time (browser-facing URL).
        # URL is non-secret and stays defaulted; the anon key must be supplied
        # (gates `docker compose build` too — see .env.example / the secret-rotation runbook).
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54351}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?set NEXT_PUBLIC_SUPABASE_ANON_KEY (no committed default)}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://symbio:${DB_PASSWORD:?set DB_PASSWORD}@db:5432/symbio?schema=public
      # NOTE: NEXTAUTH_SECRET is NOT the cookie-auth secret (auth is Supabase). It is only
      # validated by docker-entrypoint.prod.sh / deploy-prod.sh — kept required for hygiene.
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?set NEXTAUTH_SECRET (openssl rand -base64 32)}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-production}
      # Default tenant — new OAuth users join this workspace (with demo data)
      DEFAULT_TENANT_ID: ${DEFAULT_TENANT_ID:-00000000-0000-4000-a000-000000000001}
      # Supabase Auth
      # SUPABASE_INTERNAL_URL: Docker-internal URL for server-side API calls
      # NEXT_PUBLIC_SUPABASE_URL: Browser-facing URL (also used for cookie name matching)
      SUPABASE_INTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://host.docker.internal:54351}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://localhost:54351}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:?set NEXT_PUBLIC_SUPABASE_ANON_KEY (no committed default)}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - symbio-network

  # ── PostgreSQL Database ─────────────────────────────────
  db:
    image: postgres:18
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: symbio
      POSTGRES_USER: symbio
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U symbio -d symbio"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - symbio-network

volumes:
  pgdata:
    driver: local

networks:
  symbio-network:
    driver: bridge
