# Supabase Configuration for SymbioKnowledgeBase
# Own port range: 54351-54357 (separate from other projects)
# ET_ELN uses 54331-54336, ExpTube uses 54341-54347, SciSymbioLens uses 54321-54327

project_id = "SymbioKnowledgeBase"

[api]
enabled = true
port = 54351
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54352
shadow_port = 54350
major_version = 17

[studio]
enabled = true
port = 54353
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54354

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://martins-macbook-pro.tail3a744f.ts.net", "http://localhost:3000", "http://localhost:3001", "com.scisymbiolens.app://auth-callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "588839890978-dhtemct8murhd2to9fstj106u1qulgfn.apps.googleusercontent.com"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_SECRET)"
skip_nonce_check = false

[analytics]
enabled = true
port = 54357
backend = "postgres"

[edge_runtime]
enabled = false
